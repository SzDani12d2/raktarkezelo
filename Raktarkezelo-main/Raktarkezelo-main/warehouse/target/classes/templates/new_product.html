<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Új termék</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="app-shell app-shell-narrow">
    <header class="page-header">
        <div>
            <p class="page-kicker">Termékadatok</p>
            <h1>Új termék felvétele</h1>
        </div>
        <div class="header-actions">
            <a th:href="@{/}" class="btn btn-outline-secondary">Vissza</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-secondary">Kilépés</button>
            </form>
        </div>
    </header>

    <form th:action="@{/saveProduct}" th:object="${product}" method="POST" class="form-panel">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
            <label class="form-label">Termék neve</label>
            <input type="text" th:field="*{name}" class="form-control">
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></p>
        </div>
        <div class="form-group">
            <label class="form-label">Kategória</label>
            <input type="text" th:field="*{category}" class="form-control">
            <p th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-danger"></p>
        </div>
        <div class="form-grid">
        <div class="form-group">
            <label class="form-label">Mennyiség</label>
            <input type="number" min="1" th:field="*{quantity}" class="form-control">
            <p th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" class="text-danger"></p>
        </div>
        <div class="form-group">
            <label class="form-label">Ár</label>
            <input type="number" min="0.01" step="0.01" th:field="*{price}" class="form-control">
            <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger"></p>
        </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Mentés</button>
            <a th:href="@{/}" class="btn btn-outline-secondary">Mégse</a>
        </div>
    </form>
</main>
</body>
</html>
